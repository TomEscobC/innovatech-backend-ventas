# ─────────────────────────────────────────────────────────────────
# .github/workflows/deploy.yml
# Pipeline CI/CD — Backend Ventas  (EP3: orquestación en ECS)
# Trigger: push en la rama "deploy"
# Flujo: Build → Push a Amazon ECR → Deploy en ECS Fargate
# ─────────────────────────────────────────────────────────────────

name: CI/CD Backend Ventas - ECS Fargate

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: innovatech-backend-ventas
  ECS_CLUSTER: innovatech-cluster
  ECS_SERVICE: backend-ventas-service
  ECS_TASK_DEF: ecs-task-def.json
  CONTAINER_NAME: backend-ventas
  BUILD_CONTEXT: ./Springboot-API-REST

jobs:
  deploy:
    name: Build, Push a ECR y Deploy a ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolver Account ID en task definition
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          sed -i "s|ACCOUNT_ID|$ACCOUNT_ID|g; s|REGION|${{ env.AWS_REGION }}|g" ${{ env.ECS_TASK_DEF }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag y push de imagen a ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ${{ env.BUILD_CONTEXT }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Renderizar task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEF }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy a Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

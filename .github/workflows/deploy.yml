# ─────────────────────────────────────────────────────────────────
# .github/workflows/deploy.yml
# Pipeline CI/CD — Backend Ventas
# Trigger: push en la rama "deploy"
# Flujo: Build → Push a Docker Hub → Deploy en EC2
# ─────────────────────────────────────────────────────────────────

name: CI/CD Backend Ventas

on:
  push:
    branches:
      - deploy

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/backend-ventas
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Build & Push
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    name: Build y Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: ./Springboot-API-REST
          file: ./Springboot-API-REST/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Deploy en EC2
  # ──────────────────────────────────────────────────────────────
  deploy-to-ec2:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy en EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker pull ${{ env.IMAGE_NAME }}:latest

            docker stop backend-ventas 2>/dev/null || true
            docker rm backend-ventas 2>/dev/null || true

            docker run -d \
              --name backend-ventas \
              --restart unless-stopped \
              -p 8080:8080 \
              -e DB_ENDPOINT="${{ secrets.DB_ENDPOINT }}" \
              -e DB_PORT="${{ secrets.DB_PORT }}" \
              -e DB_NAME="${{ secrets.DB_NAME }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              ${{ env.IMAGE_NAME }}:latest

            sleep 10
            docker ps | grep backend-ventas

            docker image prune -f
